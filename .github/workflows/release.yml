# Two strictly separated paths:
#   - workflow_dispatch → validate job only: checks, build, npm publish --dry-run
#     (no token is ever exposed to this job).
#   - tag push v*       → publish job gated behind the protected `npm-publish`
#     environment, whose required manual approval is the ONLY way a real
#     `npm publish` can run. A tag push alone never publishes.
name: release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.3
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check
        run: pnpm run check
      - name: Coverage
        run: pnpm run test:coverage
      - name: Build
        run: pnpm run build
      - name: Publish dry-run
        run: npm publish --dry-run --access public

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: validate
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.3
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm run build
      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
